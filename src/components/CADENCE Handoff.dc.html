<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics="">
<script src="./image-slot.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=JetBrains+Mono:wght@700;800&amp;family=Zen+Kaku+Gothic+New:wght@400;500;700&amp;family=Caveat:wght@500;600;700&amp;family=Space+Mono:wght@400;700&amp;display=swap" rel="stylesheet">
<style>
  body{margin:0;background:#E9E7DF;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .tb-turn{padding:44px 48px 40px}
  .tb-name{font:700 14px/1.2 'Inter',sans-serif;color:#56585E;margin:0 0 6px}
  .tb-sub{font:400 12.5px/1.5 'Space Mono',monospace;color:rgba(86,88,94,.6);margin:0 0 26px;max-width:660px}
  .tb-oid{font:700 10.5px 'Space Mono',monospace;padding:3px 7px;background:rgba(86,88,94,.12);color:#56585E;border-radius:5px;text-decoration:none}
  .tb-opt{display:flex;flex-direction:column;gap:10px;margin-bottom:30px;scroll-margin-top:16px}
  .tb-opt:target .tb-oid{background:#B3AC91;color:#3f4136}
  .tb-olabel{display:flex;align-items:baseline;gap:8px;font:400 11px/1.3 'Space Mono',monospace;color:rgba(86,88,94,.6)}
  .tb-shell{border:1px solid #E5E3DB;border-radius:14px;overflow:hidden;box-shadow:0 1px 3px rgba(86,88,94,.06)}
  .tb-bar{display:flex;align-items:center;gap:24px;background:#F2F1EC;padding:22px 28px 18px;border-bottom:1px solid #E5E3DB}
  .tb-brand{display:flex;align-items:center;gap:10px;margin-right:6px}
  .tb-mark{font:800 19px 'JetBrains Mono',monospace;letter-spacing:-.02em;color:#56585E}
  .tb-ico{display:inline-flex;align-items:center;justify-content:center;width:44px;height:44px;background:transparent;border:none;border-radius:999px;cursor:pointer;transition:.12s}
  .tb-note{margin:26px 0 0;font:400 12px/1.7 'Space Mono',monospace;color:rgba(86,88,94,.6);max-width:780px}
  .cal-day:hover{background:rgba(0,0,0,.05)}
  .draft-note{background:transparent}
  .draft-x:hover{background:rgba(74,70,52,.10)!important}
  .draft-row:hover{background:rgba(74,70,52,.022)}
  .draft-circle:hover{border-color:#8F8C7E!important;box-shadow:0 0 0 4px rgba(107,107,96,.12)}
  .draft-scroll{scrollbar-width:thin;scrollbar-color:rgba(120,116,100,.28) transparent}
  .draft-scroll::-webkit-scrollbar{width:7px}
  .draft-scroll::-webkit-scrollbar-thumb{background:rgba(120,116,100,.26);border-radius:999px;border:2px solid transparent;background-clip:content-box}
  .draft-scroll::-webkit-scrollbar-thumb:hover{background:rgba(120,116,100,.42);background-clip:content-box}
  .draft-scroll::-webkit-scrollbar-track{background:transparent}
  .cal-scroll{scrollbar-width:thin;scrollbar-color:rgba(120,116,100,.28) transparent}
  .cal-scroll::-webkit-scrollbar{width:8px}
  .cal-scroll::-webkit-scrollbar-thumb{background:rgba(120,116,100,.24);border-radius:999px;border:2px solid transparent;background-clip:content-box}
  .cal-scroll::-webkit-scrollbar-thumb:hover{background:rgba(120,116,100,.42);background-clip:content-box}
  .cal-scroll::-webkit-scrollbar-track{background:transparent}
  .draft-noscroll{scrollbar-width:none}
  .draft-noscroll::-webkit-scrollbar{display:none}
  .wheel-col{scrollbar-width:none}
  .wheel-col::-webkit-scrollbar{display:none}
  .draft-row .draft-x{opacity:0;transition:opacity .15s,background .18s}
  .draft-row:hover .draft-x,.draft-row:focus-within .draft-x{opacity:1}
  @keyframes gspin{to{transform:rotate(360deg)}}
  .gspin{animation:gspin .8s linear infinite}
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes drawerIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
  @keyframes drawerInLeft{from{transform:translateX(-108%)}to{transform:translateX(0)}}
  @keyframes scrimIn{from{opacity:0}to{opacity:1}}
  @keyframes popIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
  @keyframes dockIn{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</helmet>

<section class="tb-turn" id="tnavv2">
  
  
  <div style="display:flex;flex-direction:column;gap:32px;align-items:flex-start">
    <div class="ex-col" id="Na"><div class="ex-cap" style="font:400 11px 'JetBrains Mono',monospace;color:rgba(63,65,54,.55);margin-bottom:10px">桌面 Desktop 參考尺寸 mac pro 13 寸</div>{{ navV2Desk }}</div>

    <div class="ex-col" id="Nc"><div class="ex-cap" style="font:400 11px 'JetBrains Mono',monospace;color:rgba(63,65,54,.55);margin-bottom:10px">手機 Mobile 參考尺寸 iphone 17<br></div>{{ navV2Phone }}</div>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    active: 'month', unread: true,
    sig: [
      { id: 'a', t: 'CALL THE DENTIST', done: false },
      { id: 'b', t: 'BUY MILK', done: true },
      { id: 'c', t: 'REPLY TO ANNA', done: false },
      { id: 'd', t: 'WEEKEND TRIP', done: false },
      { id: 'e', t: 'Q3 REVIEW DECK', done: false },
      { id: 'f', t: 'PAY RENT', done: false },
    ],
  };
  h = React.createElement.bind(React);
  componentDidMount() { this._stripEls = this._stripEls || {}; this._measureStrips(); window.addEventListener('resize', this._onResize = () => this._measureStrips()); }
  componentDidUpdate() { this._measureStrips(); }
  componentWillUnmount() { if (this._onResize) window.removeEventListener('resize', this._onResize); }
  _measureStrips() {
    if (this.state.calStripOpen === true) return; // only measurable in single-row (collapsed) state
    const els = this._stripEls || {};
    const cur = this.state.stripOF || {};
    const next = Object.assign({}, cur); let changed = false;
    Object.keys(els).forEach(uid => { const el = els[uid]; if (!el || !el.isConnected) return; const of = el.scrollWidth > el.clientWidth + 2; if (next[uid] !== of) { next[uid] = of; changed = true; } });
    if (changed) this.setState({ stripOF: next });
  }

  cal(size, body, stroke) {
    const h = this.h;
    const s = stroke || '#56585E';
    const rings = [];
    [7, 12, 17].forEach((x, i) => {
      rings.push(h('path', { key: 'r' + i, d: `M${x - 1.4} 6 Q${x - 1.4} 2.6 ${x} 2.6 Q${x + 1.4} 2.6 ${x + 1.4} 6`, fill: 'none' }));
    });
    return h('svg', {
      width: size, height: size, viewBox: '0 0 24 24', fill: 'none',
      stroke: s, strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round',
      style: { display: 'block' }
    }, [h('rect', { key: 'frame', x: 3.5, y: 5, width: 17, height: 15.5, rx: 2.4 }), ...rings, ...body(h)]);
  }
  cd_day(s, stroke, accent) {
    const a = accent || '#B3AC91';
    return this.cal(s, (h) => [
      h('line', { key: 'hd', x1: 3.5, y1: 9, x2: 20.5, y2: 9 }),
      h('rect', { key: 'blk', x: 7, y: 12, width: 10, height: 5.5, rx: 1, fill: a, stroke: 'none' }),
    ], stroke);
  }
  cd_week(s, stroke, accent) {
    const a = accent || '#B3AC91';
    return this.cal(s, (h) => [
      h('line', { key: 'hd', x1: 3.5, y1: 9, x2: 20.5, y2: 9 }),
      h('rect', { key: 'row', x: 5, y: 12, width: 14, height: 3.4, rx: .6, fill: a, stroke: 'none' }),
      h('line', { key: 'v1', x1: 8.5, y1: 12, x2: 8.5, y2: 15.4, stroke: '#fff' }),
      h('line', { key: 'v2', x1: 12, y1: 12, x2: 12, y2: 15.4, stroke: '#fff' }),
      h('line', { key: 'v3', x1: 15.5, y1: 12, x2: 15.5, y2: 15.4, stroke: '#fff' }),
    ], stroke);
  }
  cd_month(s, stroke, accent) {
    return this.cal(s, (h) => [
      h('line', { key: 'hd', x1: 3.5, y1: 9, x2: 20.5, y2: 9 }),
      h('line', { key: 'v1', x1: 9, y1: 9, x2: 9, y2: 20.5 }),
      h('line', { key: 'v2', x1: 15, y1: 9, x2: 15, y2: 20.5 }),
      h('line', { key: 'h2', x1: 3.5, y1: 13, x2: 20.5, y2: 13 }),
      h('line', { key: 'h3', x1: 3.5, y1: 16.75, x2: 20.5, y2: 16.75 }),
    ], stroke);
  }

  _avatarEl(S, key) {
    const h = this.h; const line = '#E5E3DB';
    key = key || S;
    return h('div', { key: 'avatar', onClick: () => this.openSettings(key), style: { position: 'relative', width: '38px', height: '38px', flex: 'none', cursor: 'pointer' } }, [
      h('img', { key: 's', src: 'assets/avatar.png', alt: 'Avatar', style: { display: 'block', width: '38px', height: '38px', borderRadius: '50%', objectFit: 'cover', border: '1px solid ' + line } }),
      h('span', { key: 'dot', style: { position: 'absolute', top: '-1px', right: '-1px', width: '11px', height: '11px', borderRadius: '50%', background: '#C0564B', border: '2px solid #F2F1EC' } }),
    ]);
  }
  _navAvatar(setKey) {
    const h = this.h; const line = '#E5E3DB';
    return h('button', { key: 'me', onClick: () => this.openSettings(setKey), style: { flex: 1, display: 'flex', justifyContent: 'center', alignItems: 'center', padding: '6px 0', border: 'none', background: 'transparent', cursor: 'pointer' } }, h('span', { style: { position: 'relative', display: 'block', width: '30px', height: '30px' } }, [
      h('img', { key: 'i', src: 'assets/avatar.png', alt: 'Avatar', style: { display: 'block', width: '30px', height: '30px', borderRadius: '50%', objectFit: 'cover', border: '1px solid ' + line } }),
      h('span', { key: 'd', style: { position: 'absolute', top: '-1px', right: '-1px', width: '9px', height: '9px', borderRadius: '50%', background: '#C0564B', border: '2px solid #F2F1EC' } }),
    ]));
  }
  _navAI(key) {
    const h = this.h;
    return h('button', { key: 'ai', onClick: () => this.openAssistant(key), style: { flex: 'none', display: 'flex', justifyContent: 'center', alignItems: 'center', border: 'none', background: 'transparent', cursor: 'pointer', padding: '0 10px' } }, h('span', { style: { width: '50px', height: '50px', borderRadius: '50%', background: '#FBFAF7', border: '1.6px solid #DCD8CC', display: 'grid', placeItems: 'center', boxShadow: '0 4px 12px -6px rgba(40,38,30,.22)', transform: 'translateY(-10px)' } }, this._sparkSvg(24)));
  }
  _navJournal(vkey) {
    const h = this.h; const ink3 = '#9C9E94';
    return h('button', { key: 'jn', onClick: () => this.openJournal(vkey), style: { flex: 1, display: 'flex', justifyContent: 'center', padding: '10px 0', border: 'none', background: 'transparent', cursor: 'pointer' } }, this.cd_journal(24, ink3));
  }

  // text-only tab (no icon) — for desktop pill

  // icon-only tab (for compact / mobile)

  // bottom-nav item (mobile concept B)

  // List as a mode toggle that sits with the view switcher

  // ---------- date-picker popover (July 2026) — TimeTree-style, CADENCE colors ----------
  QCOLORS = ['#E3A75C', '#8C928B', '#D6C7DB', '#C6CDBC', '#6E839B'];
  dotsFor(d) {
    const count = [3, 4, 2, 3, 4, 3, 2, 4, 3, 2][d % 10];
    const arr = [];
    for (let i = 0; i < count; i++) arr.push(this.QCOLORS[(d + i * 2) % this.QCOLORS.length]);
    return arr;
  }
  calHeader(wheel, bare, lockWheel) {
    const h = this.h;
    return h('div', { key: 'hd', style: { display: 'flex', alignItems: 'center', marginBottom: '16px' } }, [
      h('button', { key: 'my', onClick: lockWheel ? undefined : () => this.setState(s => ({ calMode: s.calMode === 'wheel' ? 'grid' : 'wheel' })),
        style: { display: 'flex', alignItems: 'center', gap: '7px', background: 'none', border: 'none', borderRadius: '10px', padding: '6px 4px', cursor: lockWheel ? 'default' : 'pointer', outline: 'none' } }, [
        h('span', { key: 'm', style: { font: "700 17px 'Zen Kaku Gothic New','Inter',sans-serif", color: '#56585E' } }, 'July'),
        h('span', { key: 'y', style: { font: "700 17px 'Zen Kaku Gothic New','Inter',sans-serif", color: '#56585E' } }, '2026'),
        lockWheel ? null : h('span', { key: 'c', style: { color: '#9C9E94', fontSize: '13px', transform: wheel ? 'rotate(180deg)' : 'none' } }, '▾'),
      ]),
      h('div', { key: 'sp', style: { flex: 1 } }),
      (wheel || bare) ? null : h('button', { key: 'today', style: { background: '#EFEDE4', border: 'none', borderRadius: '999px', padding: '6px 13px', font: "600 12px 'Inter',sans-serif", color: '#56585E', cursor: 'pointer', marginRight: '6px' } }, 'Today'),
      bare ? null : h('button', { key: 'x', onClick: () => this.setState({ calOpen: false, calMode: 'grid' }),
        style: { width: '30px', height: '30px', borderRadius: '50%', border: '1px solid #E5E3DB', background: '#FBFAF7', color: '#6E7176', fontSize: '13px', cursor: 'pointer', display: 'grid', placeItems: 'center' } }, '✕'),
    ]);
  }
  calGridView(bare) {
    const h = this.h;
    const wd = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    const wdRow = h('div', { key: 'wd', style: { display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', marginBottom: '8px' } },
      wd.map((l, i) => h('span', { key: i, style: { textAlign: 'center', font: "500 12px 'Inter',sans-serif", color: '#9C9E94' } }, l)));
    // Sunday-start; July 1 2026 = Wednesday → 3 leading blanks
    const cells = [];
    for (let i = 0; i < 3; i++) cells.push(null);
    for (let d = 1; d <= 31; d++) cells.push(d);
    const cellEls = cells.map((d, i) => {
      if (d === null) return h('div', { key: 'b' + i });
      const today = d === 3;
      const num = today
        ? h('div', { key: 'n', style: { width: '22px', height: '22px', borderRadius: '50%', background: '#56585E', color: '#fff', display: 'grid', placeItems: 'center', font: "700 12px 'JetBrains Mono',monospace" } }, d)
        : h('span', { key: 'n', style: { font: "700 13px 'JetBrains Mono',monospace", color: '#3A3A3A' } }, d);
      const dots = this.dotsFor(d);
      const dotRow = h('div', { key: 'dt', style: { display: 'flex', gap: '2.5px', marginTop: '4px', height: '5px' } },
        dots.map((c, j) => h('span', { key: j, style: { width: '5px', height: '5px', borderRadius: '50%', background: c } })));
      return h('div', { key: i, className: 'cal-day', style: { display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'flex-start', padding: '5px 0 4px', borderRadius: '9px', cursor: 'pointer', minHeight: '42px' } }, [num, dotRow]);
    });
    const grid = h('div', { key: 'g', style: { display: 'grid', gridTemplateColumns: 'repeat(7,1fr)', gap: '2px' } }, cellEls);
    return [this.calHeader(false, bare), wdRow, grid];
  }
  wheelCol(items, centerIdx, big) {
    const h = this.h;
    return h('div', { style: { flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '14px' } },
      items.map((it, i) => {
        const dist = Math.abs(i - centerIdx);
        const isC = i === centerIdx;
        const op = isC ? 1 : dist === 1 ? 0.55 : dist === 2 ? 0.32 : dist === 3 ? 0.16 : 0.08;
        return h('span', { key: i, style: { opacity: op, font: (isC ? '700 ' + (big ? 26 : 24) : '500 17') + "px 'Zen Kaku Gothic New','Inter',sans-serif", color: '#56585E', whiteSpace: 'nowrap' } }, it);
      }));
  }
  calWheelView(bare, lockWheel) {
    const h = this.h;
    const months = ['April', 'May', 'June', 'July', 'August', 'September', 'October'];
    const years = ['2023', '2024', '2025', '2026', '2027', '2028', '2029'];
    const wheels = h('div', { key: 'wl', style: { display: 'flex', height: '300px', overflow: 'hidden', alignItems: 'center', WebkitMaskImage: 'linear-gradient(180deg,transparent,#000 28%,#000 72%,transparent)', maskImage: 'linear-gradient(180deg,transparent,#000 28%,#000 72%,transparent)' } }, [
      this.wheelCol(months, 3, false),
      this.wheelCol(years, 3, true),
    ]);
    return [this.calHeader(true, bare, lockWheel), wheels];
  }

  // inbox panel (spec) — right drawer / full-screen sheet

  // playful speech-bubble inbox (David-Shrigley-style, CADENCE event colours)

  // slide-archive inbox — mounted "slides" with colour-block thumb + handwritten caption

  // signage-style inbox (wayfinding capsules — deep green, uppercase)

  // notebook + quill — journal / inbox (matches icon set 14)
  cd_journal(s, stroke, accent) {
    const h = this.h;
    const strk = stroke || '#56585E';
    const a = accent || '#B3AC91';
    return h('svg', { width: s, height: s, viewBox: '0 0 24 24', fill: 'none', stroke: strk, strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round', style: { display: 'block' } }, [
      h('path', { key: 'page', d: 'M5 4.5 h8.4 a1.4 1.4 0 0 1 1.4 1.4 V13' }),
      h('path', { key: 'page2', d: 'M5 4.5 a1.4 1.4 0 0 0 -1.4 1.4 V18.6 a1.4 1.4 0 0 0 1.4 1.4 h8.4 a1.4 1.4 0 0 0 1.4 -1.4 V17' }),
      h('line', { key: 'l1', x1: 6.6, y1: 8, x2: 11.5, y2: 8 }),
      h('line', { key: 'l2', x1: 6.6, y1: 11, x2: 9.4, y2: 11 }),
      h('path', { key: 'vane', d: 'M20.4 4 C21.4 6.6 20.7 9.6 18.6 12 C17.1 13.7 15 14.8 12.7 15.3 C14.2 12.8 15.9 10.2 17.6 7.9 C18.6 6.5 19.5 5 20.4 4 Z', fill: a, stroke: 'none', opacity: 0.9 }),
      h('path', { key: 'spine', d: 'M20.4 4 L12.7 15.3 L10.8 18' }),
      h('line', { key: 'b1', x1: 17.6, y1: 7.9, x2: 15.4, y2: 8.3 }),
      h('line', { key: 'b2', x1: 16, y1: 10.3, x2: 13.9, y2: 10.8 }),
    ]);
  }
  // inbox overlay for the live topbar (desktop rounded drawer / tablet+mobile bottom sheet)

  // heuristic "AI" that reads a draft note and proposes task/event + quadrant + when

  _scheduleDraft(qk, i, plan) {
    const key = qk + ':' + i;
    this.setState(s => ({
      draftSched: Object.assign({}, s.draftSched, { [key]: plan }),
      draftDone: Object.assign({}, s.draftDone, { [key]: true }),
      draftConv: null,
    }));
  }
  // draft / paper-note inbox — dotted grid paper, handwriting, highlighter, paperclip
  draftInbox(cfg) {
    const h = this.h;
    const magIcon = (sz, col) => h('svg', { width: sz, height: sz, viewBox: '0 0 24 24', fill: 'none', stroke: col || '#8A8A80', strokeWidth: 2, strokeLinecap: 'round' }, [h('circle', { key: 'c', cx: 10.5, cy: 10.5, r: 6.5 }), h('line', { key: 'l', x1: 15.5, y1: 15.5, x2: 20, y2: 20 })]);
    const dd = this.state.draftDone || {};
    const qk = cfg.qaKey || 'desk';
    const PAL = { plan: '#6E839B', do: '#C56A5E', quick: '#BFA86A', later: '#9A988F', event: '#E3A75C' };
    const aiOn = !!((this.state.draftAI || {})[qk]);
    const query = ((this.state.draftSearch && this.state.draftSearch[qk]) || '');
    const q = query.trim().toLowerCase();
    const baseItems = [
      { t: 'Call the dentist', hl: false, done: false, g: 'Today' },
      { t: 'Buy milk on the way home', hl: true, done: false, g: 'Today' },
      { t: 'Reply to Anna', hl: false, done: true, g: 'Yesterday' },
      { t: 'Weekend trip?', hl: false, done: false, g: 'Yesterday' },
      { t: 'Q3 review deck', hl: true, done: false, g: 'Previous 7 Days' },
      { t: 'Pay the rent', hl: false, done: false, g: 'Previous 7 Days' },
    ];
    const items = baseItems.concat((this.state.draftAdd || {})[qk] || []).map((it, i) => {
      const ov = dd[qk + ':' + i];
      return { ...it, done: ov === undefined ? it.done : ov };
    });
    const holeCount = Math.max(6, Math.round((parseInt(cfg.w) || 440) / 58));
    const binding = h('div', { key: 'bind', style: { display: 'flex', justifyContent: 'space-between', padding: '15px 26px 3px' } },
      Array.from({ length: holeCount }).map((_, i) => h('div', { key: i, style: { width: '13px', height: '23px', borderRadius: '999px', background: '#F2F1EC', boxShadow: 'inset 0 2.5px 3px rgba(74,70,52,.3), inset 0 -1.5px 1.5px rgba(255,255,255,.55)', flex: 'none' } })));
    const header = h('div', { key: 'hd', style: { position: 'relative', display: 'flex', alignItems: 'center', gap: '12px', padding: '14px 22px 14px' } }, [
      null,
      h('span', { key: 't', style: { flex: 1, font: "800 20px 'Zen Kaku Gothic New','Inter',sans-serif", letterSpacing: '-.01em', color: '#56585E' } }, 'Draft'),
      h('button', { key: 'mag', 'aria-label': 'Search', className: 'draft-x', onClick: () => this.setState(s => ({ draftSearchOpen: Object.assign({}, s.draftSearchOpen, { [qk]: !((s.draftSearchOpen || {})[qk]) }) })), style: { width: '30px', height: '30px', borderRadius: '50%', border: 'none', background: 'transparent', cursor: 'pointer', display: 'grid', placeItems: 'center', transition: 'background .15s' } }, magIcon(17, '#8A8A80')),
      h('button', { key: 'x', className: 'draft-x', onClick: cfg.onClose, style: { width: '30px', height: '30px', borderRadius: '50%', border: 'none', background: 'transparent', cursor: 'pointer', color: '#8A8A80', fontSize: '14px', transition: 'background .15s' } }, '✕'),
